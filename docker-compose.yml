services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: consentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-consentflow}
      POSTGRES_USER: ${POSTGRES_USER:-consentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-consentflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-consentflow} -d ${POSTGRES_DB:-consentflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - consentflow-net

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: consentflow-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - consentflow-net

  # ── ConsentFlow API ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consentflow-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-consentflow}
      POSTGRES_USER: ${POSTGRES_USER:-consentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-consentflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - consentflow-net

volumes:
  postgres_data:

networks:
  consentflow-net:
    driver: bridge
